# CI/CD — every push and PR runs the full keyless oracle (check, lint, build,
# unit, browser e2e); pushes to main and v* tags additionally run the docker
# e2e (the repo's own packaging gate) and, only if everything is green,
# publish a multi-arch image to GHCR. Publishing needs no secrets beyond the
# workflow's own GITHUB_TOKEN (packages: write).
name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run lint
      - run: bun run build
      # Serial forks: CI runners have few cores, and the suite's documented
      # contention flake (api.* timeouts under load) only appears in parallel
      # runs. ~90s serial beats a flaky 40s.
      - run: bunx vitest run --passWithNoTests --pool=forks --poolOptions.forks.maxForks=1
      - run: bunx playwright install --with-deps chromium
      - run: bunx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # The §28.8/Phase-4 docker oracle: build the real image, boot it, drive it
  # with a browser. This is what makes a published image trustworthy.
  docker-e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:docker
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: docker-e2e-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  publish:
    runs-on: ubuntu-latest
    needs: [test, docker-e2e]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # main -> :latest + :main; v1.2.3 tag -> :1.2.3 + :1.2 + :latest;
          # every push also gets an immutable :sha-<short> tag.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
